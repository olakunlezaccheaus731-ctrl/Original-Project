<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.cdnfonts.com/css/rency" rel="stylesheet">
    <style>
         *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #eef1f6;
      --card-bg: #ffffff;
      --primary: #1a56db;
      --primary-hover: #1648c0;
      --text-dark: #0d1f3c;
      --text-muted: #8a93a6;
      --text-link: #1a56db;
      --border: #dde3ee;
      --shadow: 0 8px 40px rgba(26,86,219,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --font: 'Rency', sans-serif;
    }
 
    body {
      font-family: var(--font);
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* ── HEADER ── */
    header { padding: 18px 40px; flex-shrink: 0; }
 
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
 
    .logo-text {
      font-size: 18px; font-weight: 700;
      color: var(--primary); letter-spacing: -0.3px;
    }
 
    /* ── MAIN ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 24px 60px;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
 
    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 48px 44px 44px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
      width: 100%;
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .card h1 {
      font-size: clamp(28px, 3.5vw, 46px);
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }
 
    .signin-note { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .signin-note a { color: var(--text-link); font-weight: 600; text-decoration: none; }
    .signin-note a:hover { text-decoration: underline; }
 
    /* ── GOOGLE BTN ── */
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 11px 20px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      margin-bottom: 20px;
      white-space: nowrap;
    }
    .btn-google:hover { border-color: #b0bcd8; box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: #f7f9fc; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
 
    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; color: var(--text-muted); font-size: 13px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
 
    /* ── INPUT ── */
    .field { margin-bottom: 20px; }
    .field input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--font);
      font-size: 14.5px;
      color: var(--text-dark);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
 
    /* ── CONTINUE BTN ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--primary); color: #fff;
      font-family: var(--font); font-size: 15px; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 16px rgba(26,86,219,0.28); }
    .btn-primary:active { transform: scale(0.98); }
 
    /* ── RIGHT PANEL ── */
    .right-panel {
      display: flex; flex-direction: column; align-items: flex-start;
      padding-left: 20px;
      animation: fadeUp 0.6s ease 0.1s both;
    }
 
    .cta-box { margin-bottom: 28px; }
    .cta-box h2 { font-size: clamp(17px, 2vw, 22px); font-weight: 700; color: var(--text-dark); margin-bottom: 8px; letter-spacing: -0.3px; }
    .cta-box p  { font-size: 14.5px; color: var(--text-muted); line-height: 1.5; max-width: 260px; }
 
    .cta-link {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
      font-size: 13.5px; font-weight: 600; color: var(--text-dark);
      text-decoration: none; background: #fff; border-radius: 20px;
      padding: 7px 14px 7px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .cta-link:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); transform: translateX(2px); }
    .cta-dot { width: 10px; height: 10px; border-radius: 50%; background: #f5a623; flex-shrink: 0; }
    .cta-arrow { font-size: 14px; color: var(--text-muted); }
 
    /* ── ISO ── */
    .iso-wrap { width: 100%; max-width: 580px; }
    .iso-wrap svg { width: 100%; height: auto; }
 
    /* ── FOOTER ── */
    footer {
      padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: var(--text-muted);
      flex-wrap: wrap; gap: 8px; flex-shrink: 0;
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .sec-badge {
      width: 22px; height: 22px; border-radius: 50%; background: #dde3ee;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    footer a { color: var(--text-link); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }
 
    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--primary); color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(26,86,219,0.35);
      transition: transform 0.2s, box-shadow 0.2s; z-index: 100;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(26,86,219,0.45); }
 
    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
 
    /* Tablet landscape → stack */
    @media (max-width: 960px) {
      main {
        grid-template-columns: 1fr;
        padding: 24px 32px 32px;
        gap: 24px;
      }
      .card { max-width: 540px; margin: 0 auto; padding: 40px 36px; }
      .right-panel { padding-left: 0; max-width: 540px; margin: 0 auto; width: 100%; }
      .iso-wrap { max-width: 440px; }
    }
 
    /* Tablet portrait */
    @media (max-width: 700px) {
      header { padding: 16px 24px; }
      main { padding: 16px 20px 28px; gap: 20px; }
      .card { padding: 36px 28px 30px; border-radius: 16px; }
      .card h1 { font-size: 30px; letter-spacing: -1px; margin-bottom: 14px; }
      footer { padding: 14px 20px; }
    }
 
    /* Mobile */
    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      main { padding: 12px 12px 24px; }
      .card { padding: 28px 20px 24px; border-radius: 14px; }
      .card h1 { font-size: 26px; margin-bottom: 12px; }
      .signin-note { margin-bottom: 22px; }
      .btn-google { width: 100%; justify-content: center; }
      .cta-box p { max-width: 100%; }
      .iso-wrap { max-width: 100%; }
      footer { padding: 12px 16px; font-size: 12px; flex-direction: column; align-items: flex-start; gap: 6px; }
      .fab { bottom: 14px; right: 14px; width: 40px; height: 40px; }
    }
 
    @media (max-width: 340px) {
      .card { padding: 22px 14px 18px; }
      .card h1 { font-size: 22px; }
    </style>
</head>
<body>
